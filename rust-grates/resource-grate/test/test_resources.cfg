# Resource config for testing the resource grate.
# Limits are intentionally low to verify rate-limiting and caps.

resource cpu 0.10               # 10% CPU
resource memory 15000000        # 15 MB
resource diskused 100000000     # 100 MB

# Renewable (rate per second)
resource filewrite 50000        # 50 KB/sec — low enough to observe throttling
resource fileread 50000         # 50 KB/sec
resource netsend 10000          # 10 KB/sec
resource netrecv 10000          # 10 KB/sec
resource loopsend 1000000       # 1 MB/sec
resource looprecv 1000000       # 1 MB/sec
resource lograte 30000          # 30 KB/sec
resource random 10000           # 10 KB/sec

# Fungible (concurrent caps)
resource events 10              # max 10 threads
resource filesopened 5          # max 5 open files — test_filesopened_cap triggers at this
resource insockets 5
resource outsockets 5

# Individual (port allowlists)
resource messport 12345
resource connport 12345
resource messport 12346
resource connport 12346
