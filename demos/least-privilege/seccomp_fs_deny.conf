; Deny filesystem access by default.
; Whitelist only the syscalls needed for basic execution.
; Filesystem syscalls (open, mkdir, stat, etc.) are NOT whitelisted,
; so they return EPERM.

[default]
blacklist

[whitelist]
SYS_exec
SYS_fork
SYS_write
SYS_read
SYS_close
SYS_futex
SYS_mmap
SYS_munmap
SYS_exit_group
SYS_exit
SYS_getpid
SYS_waitpid
