; default policy is set to blacklist
;
; i.e. all the syscalls except the ones defined 
; in the whitelist section will be blocked

[default]
blacklist


; allowed syscalls
;
; some of the syscalls below are generic and currently
; needs to be added since they are required for the cage
; initialization and termination.

[whitelist]
SYS_open
SYS_exec
SYS_write
SYS_close
SYS_unlink
SYS_futex
SYS_mmap
SYS_munmap
SYS_exit_group


; explicitly added for example.
;
; adding [blacklist] section won't change the behavior 
; if default policy is set to blacklist.
;
; provided test expects chmod to blocked.

[blacklist]
SYS_chmod
