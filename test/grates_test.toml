# Grate test suite configuration.
#
# Each [[grate]] entry defines a grate to build and test.
#
# Fields:
#   name      - display name
#   dir       - directory under c-grates/ or rust-grates/ (determined by type)
#   type      - "rust" or "c"
#   binary    - (optional) cwasm filename in lindfs (without .cwasm)
#               defaults to name
#   tests     - list of test entries
#   skip      - (optional) skip this grate entirely
#
# Test fields:
#   test_src   - C source file to compile (relative to grate dir)
#   grate_args - (optional) extra args between grate and test binary
#   files      - (optional) extra files to copy into lindfs
#   lindfs_dir - (optional) also copy test cwasm into this lindfs subdirectory
#   timeout    - (optional) timeout in seconds (default: 60)
#   skip       - (optional) skip this test

# ── Geteuid (C) ─────────────────────────────────────────────────────

[[grate]]
name = "geteuid-grate"
dir = "geteuid-grate"
type = "c"
binary = "geteuid-grate"

[[grate.tests]]
test_src = "test/geteuid.c"

